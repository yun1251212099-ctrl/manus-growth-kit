<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>正在跳转到 Manus…</title>
    <meta http-equiv="refresh" content="3; url=https://manus.im/login?code=SWHYHXZR1GFYYXR" />
    <style>
      :root {
        color-scheme: light dark;
        --text: rgba(0, 0, 0, 0.88);
        --muted: rgba(0, 0, 0, 0.64);
        --bg: #f6f7fb;
        --card: rgba(0, 0, 0, 0.04);
        --border: rgba(0, 0, 0, 0.12);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --text: rgba(255, 255, 255, 0.92);
          --muted: rgba(255, 255, 255, 0.72);
          --bg: #0b0d10;
          --card: rgba(255, 255, 255, 0.06);
          --border: rgba(255, 255, 255, 0.14);
        }
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", Roboto, Helvetica, Arial;
        background: var(--bg);
        color: var(--text);
      }
      .wrap {
        max-width: 740px;
        margin: 0 auto;
        padding: 32px 18px;
      }
      .card {
        border: 1px solid var(--border);
        background: var(--card);
        border-radius: 14px;
        padding: 16px 16px;
      }
      h1 {
        font-size: 18px;
        margin: 0 0 8px;
      }
      p {
        margin: 0 0 12px;
        color: var(--muted);
        line-height: 1.5;
      }
      a {
        color: inherit;
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>正在跳转到 Manus 注册/登录页…</h1>
        <p>
          如果没有自动跳转，点这里：
          <a id="fallback" href="https://manus.im/login?code=SWHYHXZR1GFYYXR">打开 Manus</a>
        </p>
        <p class="muted">
          说明：本页会做一次点击统计，然后跳转到 Manus（你的邀请码会自动带上）。
        </p>
      </div>
    </div>

    <script>
      (function () {
        const INVITE_CODE = "SWHYHXZR1GFYYXR";
        const COUNTAPI_NAMESPACE = "manus_swhyhxzr1gfyyxr";
        const TIME_ZONE = "Asia/Shanghai";
        const MANUS_LOGIN = "https://manus.im/login";

        const params = new URLSearchParams(window.location.search);
        const srcRaw = params.get("src") || "direct";
        const conv = (params.get("conv") || "") === "1";

        const src = srcRaw
          .toLowerCase()
          .replace(/[^a-z0-9_-]/g, "_")
          .slice(0, 40);

        const date = new Intl.DateTimeFormat("en-CA", {
          timeZone: TIME_ZONE,
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
        }).format(new Date());

        const hit = (key) => {
          const url = `https://api.countapi.xyz/hit/${COUNTAPI_NAMESPACE}/${encodeURIComponent(
            key
          )}`;
          return fetch(url, {
            method: "GET",
            mode: "cors",
            cache: "no-store",
            keepalive: true,
          }).catch(() => null);
        };

        const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

        const clickKeys = [
          "click_total",
          `click_${date}_total`,
          `click_${date}_${src}`,
        ];

        const logClicks = Promise.allSettled(clickKeys.map(hit));

        const target = new URL(MANUS_LOGIN);
        target.searchParams.set("code", INVITE_CODE);

        for (const [k, v] of params.entries()) {
          if (k.startsWith("utm_") && v) target.searchParams.set(k, v);
        }

        if (conv) {
          // Keep this working even if deployed under a subpath (e.g. GitHub Pages).
          const doneUrl = new URL("../done/", window.location.href);
          doneUrl.searchParams.set("src", src);
          for (const [k, v] of params.entries()) {
            if (k.startsWith("utm_") && v) doneUrl.searchParams.set(k, v);
          }
          target.searchParams.set("redirectUrl", doneUrl.toString());
        }

        document.getElementById("fallback").href = target.toString();

        Promise.race([logClicks, sleep(320)]).finally(() => {
          window.location.replace(target.toString());
        });
      })();
    </script>
  </body>
</html>
